<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>The Oracle Relay Configuration</title>
<style>
        .hover-lift {
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        .hover-lift:hover {
            transform: translateY(-4px);
        }
        .hover-lift::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: #D4AF37;
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        .hover-lift:hover::after {
            opacity: 1;
        }
        
        /* Custom Scrollbar for the void */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #050505; 
        }
        ::-webkit-scrollbar-thumb {
            background: #2D2D2D; 
            border-radius: 0;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #D4AF37; 
        }

        .sp {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #2D2D2D;
            border-top-color: #D4AF37;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .msg {
            display: none;
            padding: 12px;
            margin-top: 16px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 13px;
            border-left: 2px solid;
            background: #353534;
        }
        .msg.err {
            border-color: #FF4B2B;
            color: #FF4B2B;
        }
        .msg.ok {
            border-color: #00D1FF;
            color: #00D1FF;
        }
        .msg.err::before { content: '[ERR] '; }
        .msg.ok::before { content: '[ OK] '; }

<style>/* CRT Scanline Effect */ .crt-overlay::before { content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(to bottom, rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%); background-size: 100% 4px; z-index: 50; pointer-events: none; } /* Oracle Glow Effect */ .oracle-glow { position: relative; } .oracle-glow::after { content: ""; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 120%; height: 120%; background: radial-gradient(circle, rgba(212, 175, 55, 0.05) 0%, rgba(212, 175, 55, 0) 70%); z-index: -1; pointer-events: none; } /* Terminal Blinking Cursor */ .blinking-cursor { animation: blink 1s step-end infinite; } @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
/* Finishing Touches */
.oracle-flash {
  box-shadow: 0 0 40px 15px rgba(212,175,55,0.7), inset 0 0 20px rgba(212,175,55,0.5);
  background-color: rgba(212, 175, 55, 0.6) !important;
  border-color: rgba(212, 175, 55, 1) !important;
  transition: all 0.05s ease-out;
}

@keyframes crt-flicker {
  0% { opacity: 0.95; }
  5% { opacity: 0.85; }
  10% { opacity: 0.95; }
  15% { opacity: 1; }
  50% { opacity: 0.95; }
  55% { opacity: 0.9; }
  60% { opacity: 1; }
  100% { opacity: 1; }
}
.crt-flicker {
  animation: crt-flicker 3s infinite;
  text-shadow: 0 0 2px rgba(212,175,55,0.4), 0 0 4px rgba(0,209,255,0.2);
}

.btn-shimmer {
  position: relative;
  overflow: hidden;
}
.btn-shimmer::before {
  content: '';
  position: absolute;
  top: 0; left: -100%; width: 50%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  transform: skewX(-25deg);
  transition: none;
  z-index: 10;
}
.btn-shimmer:hover::before, .btn-shimmer:focus::before {
  animation: shimmer 1.5s infinite;
}
@keyframes shimmer {
  100% { left: 200%; }
}
.scanline-bg {
  background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
}
</style>

<script>
/* ── Terminal Log ───────────────────────────────────────── */
const COLORS = { SYS: 'text-oracle-gold', SEC: 'text-oracle-gold', OK: 'text-ethereal-blue', ERR: 'text-[#FF4B2B]', INFO: 'text-on-surface-variant' };
function log(type, msg) {
  const inner = document.getElementById('termInner');
  if (!inner) return;
  // Remove blinking cursor from last line if present
  const prev = inner.querySelector('.blinking-cursor');
  if (prev) prev.remove();
  const line = document.createElement('div');
  const color = COLORS[type] || COLORS.INFO;
  line.innerHTML = `<span class="${color}">[${type}]</span> ${msg}<span class="blinking-cursor ml-1 w-2 h-4 bg-oracle-gold inline-block align-middle"></span>`;
  inner.appendChild(line);
  // Keep max 40 lines
  while (inner.children.length > 40) inner.removeChild(inner.firstChild);
  document.getElementById('termLog').scrollTop = 99999;
}

/* ── Port badge ─────────────────────────────────────────── */
function setPortBadge(port) {
  const b = document.getElementById('pbadge');
  const icon = b.querySelector('span.inline-block');
  const text = b.querySelectorAll('span')[1];
  
  if (port === 8883) {
    b.className = "mt-2 text-[10px] uppercase tracking-widest text-ethereal-blue transition-colors flex items-center gap-1";
    icon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" height="1em" viewBox="0 -960 960 960" width="1em" fill="currentColor"><path d="M240-80q-33 0-56.5-23.5T160-160v-400q0-33 23.5-56.5T240-640h40v-80q0-83 58.5-141.5T480-920q83 0 141.5 58.5T680-720v80h40q33 0 56.5 23.5T800-560v400q0 33-23.5 56.5T720-80H240Zm0-80h480v-400H240v400Zm240-120q33 0 56.5-23.5T560-360q0-33-23.5-56.5T480-440q-33 0-56.5 23.5T400-360q0 33 23.5 56.5T480-280ZM360-640h240v-80q0-50-35-85t-85-35q-50 0-85 35t-35 85v80ZM240-160v-400 400Z"/></svg>';
    text.textContent = 'TLS Encrypted';
  } else if (port === 1883) {
    b.className = "mt-2 text-[10px] uppercase tracking-widest text-oracle-gold transition-colors flex items-center gap-1";
    icon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" height="1em" viewBox="0 -960 960 960" width="1em" fill="currentColor"><path d="M240-80q-33 0-56.5-23.5T160-160v-400q0-33 23.5-56.5T240-640h280v-80q0-83 58.5-141.5T720-920q83 0 141.5 58.5T920-720h-80q0-50-35-85t-85-35q-50 0-85 35t-35 85v80h80q33 0 56.5 23.5T760-560v400q0 33-23.5 56.5T680-80H240Zm0-80h440v-400H240v400Zm220-120q33 0 56.5-23.5T540-360q0-33-23.5-56.5T460-440q-33 0-56.5 23.5T380-360q0 33 23.5 56.5T460-280Zm-220 120v-400 400Z"/></svg>';
    text.textContent = 'Unencrypted';
  } else {
    b.className = "mt-2 text-[10px] uppercase tracking-widest text-tower-grey transition-colors flex items-center gap-1";
    icon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" height="1em" viewBox="0 -960 960 960" width="1em" fill="currentColor"><path d="M370-80l-16-128q-13-5-24.5-12T307-235l-119 50L78-375l103-78q-1-7-1-13.5v-27q0-6.5 1-13.5L78-585l110-190 119 50q11-8 23-15t24-12l16-128h220l16 128q13 5 24.5 12t22.5 15l119-50 110 190-103 78q1 7 1 13.5v27q0 6.5-2 13.5l103 78-110 190-118-50q-11 8-23 15t-24 12L590-80H370Zm112-260q58 0 99-41t41-99q0-58-41-99t-99-41q-59 0-99.5 41T342-480q0 58 40.5 99t99.5 41Zm0-80q-25 0-42.5-17.5T422-480q0-25 17.5-42.5T482-540q25 0 42.5 17.5T542-480q0 25-17.5 42.5T482-420Zm-2-60Zm-40 320h79l14-106q31-8 57.5-23.5T639-327l99 41 39-68-86-65q5-14 7-29.5t2-31.5q0-16-2-31.5t-7-29.5l86-65-39-68-99 42q-22-23-48.5-38.5T533-694l-13-106h-79l-14 106q-31 8-57.5 23.5T321-633l-99-41-39 68 86 64q-5 15-7 30t-2 32q0 16 2 31t7 30l-86 65 39 68 99-42q22 23 48.5 38.5T427-266l13 106Z"/></svg>';
    text.textContent = 'Custom port';
  }
}

document.getElementById('mqttPort').addEventListener('input', function () {
  setPortBadge(parseInt(this.value, 10));
  document.getElementById('portPreset').value =
    (this.value === '8883' || this.value === '1883') ? this.value : '';
  const p = parseInt(this.value, 10);
  if (p === 8883) log('SYS', 'Protocol: TLS (port 8883)');
  else if (p === 1883) log('ERR', 'Warning: plaintext MQTT (port 1883)');
  else if (!isNaN(p)) log('SYS', `Custom port selected: ${p}`);
});

function applyPreset() {
  const v = document.getElementById('portPreset').value;
  if (v) {
    document.getElementById('mqttPort').value = v;
    setPortBadge(parseInt(v,10));
    if (v === '8883') log('SYS', 'Protocol: TLS (port 8883)');
    else if (v === '1883') log('ERR', 'Warning: plaintext MQTT (port 1883)');
  }
}

/* ── UI helpers ─────────────────────────────────────────── */
function togglePw(id, btn) {
  const el = document.getElementById(id);
  const show = el.type === 'password';
  el.type = show ? 'text' : 'password';
  btn.textContent = show ? 'Hide' : 'Show';
}

function handleSsidChange() {
  const val = document.getElementById('ssid').value;
  document.getElementById('manualField').style.display =
    val === '__manual__' ? 'block' : 'none';
  if (val && val !== '__manual__') log('SYS', `Target network selected: ${val}`);
  if (val === '__manual__') log('INFO', 'Manual SSID entry mode activated');
}

function showErr(msg) {
  const e = document.getElementById('errMsg');
  e.textContent = msg; e.style.display = 'block';
  document.getElementById('okMsg').style.display = 'none';
  log('ERR', msg);
}
function showOk(msg) {
  const o = document.getElementById('okMsg');
  o.textContent = msg; o.style.display = 'block';
  document.getElementById('errMsg').style.display = 'none';
  log('OK', msg);
}

/* ── WiFi scan ──────────────────────────────────────────── */
async function scanNetworks() {
  const btn = document.getElementById('scanBtn');
  btn.innerHTML = '<span class="sp"></span>';
  btn.disabled = true;
  log('SYS', 'Initiating frequency scan...');
  try {
    const nets = await (await fetch('/api/scan')).json();
    const sel  = document.getElementById('ssid');
    sel.innerHTML = '<option value="">— select a network —</option>';
    nets.sort((a,b) => b.rssi - a.rssi).forEach(n => {
      const bars = n.rssi > -55 ? '▂▄▆█' :
                   n.rssi > -70 ? '▂▄▆·' :
                   n.rssi > -80 ? '▂▄··' : '▂···';
      const opt  = document.createElement('option');
      opt.value  = n.ssid;
      opt.textContent = n.ssid + (n.auth ? '  🔒' : '  🔓') +
                        '  ' + bars + '  (' + n.rssi + ' dBm)';
      sel.appendChild(opt);
    });
    const m = document.createElement('option');
    m.value = '__manual__'; m.textContent = 'Enter manually…';
    sel.appendChild(m);
    log('OK', `Scan complete — ${nets.length} network${nets.length !== 1 ? 's' : ''} found`);
    if (nets.length > 0) log('INFO', `Strongest: ${nets[0].ssid} (${nets[0].rssi} dBm)`);
  } catch (_) {
    showErr('Scan failed — confirm device is in AP mode');
  }
  btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" height="1em" viewBox="0 -960 960 960" width="1em" fill="currentColor"><path d="M480-320q75 0 127.5-52.5T660-500q0-75-52.5-127.5T480-680q-75 0-127.5 52.5T300-500q0 75 52.5 127.5T480-320Zm0-72q-45 0-76.5-31.5T372-500q0-45 31.5-76.5T480-608q45 0 76.5 31.5T588-500q0 45-31.5 76.5T480-392Zm0 192q-146 0-266-81.5T40-500q54-137 174-218.5T480-800q146 0 266 81.5T920-500q-54 137-174 218.5T480-200Zm0-300Zm0 220q113 0 207.5-59.5T832-500q-50-101-144.5-160.5T480-720q-113 0-207.5 59.5T48-500q50 101 144.5 160.5T480-280Z"/></svg> SCAN';
  btn.disabled = false;
}

/* ── Submit ─────────────────────────────────────────────── */
function resetBtn() {
  const b = document.getElementById('submitBtn');
  b.disabled = false;
  b.innerHTML = '<div class="absolute inset-0 pointer-events-none scanline-bg"></div><span class="relative z-10">COMMENCE RITUAL</span><span class="inline-block text-[16px] relative z-10"><svg xmlns="http://www.w3.org/2000/svg" height="1em" viewBox="0 -960 960 960" width="1em" fill="currentColor"><path d="M840-680v480q0 33-23.5 56.5T760-120H200q-33 0-56.5-23.5T120-200v-560q0-33 23.5-56.5T200-840h480l160 160Zm-80 34L646-760H200v560h560v-446ZM480-240q50 0 85-35t35-85q0-50-35-85t-85-35q-50 0-85 35t-35 85q0 50 35 85t85 35ZM240-560h360v-160H240v160Zm-40-86v446-560 114Z"/></svg></span>';
}

async function submit() {
  document.getElementById('errMsg').style.display = 'none';
  document.getElementById('okMsg').style.display  = 'none';

  const el = (id) => document.getElementById(id);
  const ssidSel = el('ssid').value;
  const ssid = ssidSel === '__manual__' ? el('ssidManual').value.trim() : ssidSel;
  const mqttUrl = el('mqttUrl').value.trim();
  const mqttPort = parseInt(el('mqttPort').value, 10);
  const wifi_p = el('wifiPass').value;
  const user = el('mqttUser').value.trim();
  const pass = el('mqttPass').value;
  const hname = el('hostname').value.trim();
  const secureon = el('secureonPwd').value.trim();

  if (!ssid) { showErr('No network selected — run a scan or enter manually'); return; }
  if (!mqttUrl) { showErr('MQTT broker hostname is required'); return; }
  if (mqttPort < 1 || mqttPort > 65535) { showErr('Port must be between 1 and 65535'); return; }

  const payload = {
    wifi_ssid: ssid,
    wifi_pass: wifi_p,
    mqtt_url:  mqttUrl,
    mqtt_port: mqttPort,
    mqtt_user: user,
    mqtt_pass: pass,
  };

  if (hname.length > 0) {
    if (!/^[a-zA-Z0-9]([a-zA-Z0-9-]{0,30}[a-zA-Z0-9])?$/.test(hname)) {
      showErr('Hostname: letters, digits and hyphens only; cannot start or end with a hyphen');
      return;
    }
    payload.hostname = hname;
  }
  
  if (secureon.length > 0) {
    payload.secureon_pwd = secureon;
  }

  log('SYS', `Provisioning: SSID=${ssid} broker=${mqttUrl}:${mqttPort}`);
  if (payload.hostname) log('INFO', `Hostname override: ${payload.hostname}`);
  if (payload.secureon_pwd) log('INFO', `SecureOn enabled`);
  log('SYS', 'Writing credentials to NVS flash...');

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="absolute inset-0 pointer-events-none scanline-bg"></div><span class="sp relative z-10"></span><span class="ml-2 relative z-10 text-void-black">Writing to flash…</span>';

  try {
    const res  = await fetch('/api/provision', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    
    if (res.ok) {
      log('OK', 'Credentials committed to NVS');
      btn.innerHTML = '<div class="absolute inset-0 pointer-events-none scanline-bg"></div><span class="relative z-10 text-void-black">✓ Saved</span>';
      await new Promise(r => setTimeout(r, 600));
      const htmlText = await res.text();
      document.open();
      document.write(htmlText);
      document.close();
    } else {
      const data = await res.json();
      showErr(data.error || 'Unknown server error');
      resetBtn();
    }
  } catch (_) {
    showErr('Request failed — device may have rebooted already');
    resetBtn();
  }
}

/* ── Morse Code Animation ───────────────────────────────── */
const morseMsg = "-.. --- / -. --- - / .-.. --- --- -.- / .- - / -- .";
const dotLen = 250;
const eyeEl = document.getElementById('oracle-eye');

async function playMorse() {
  if (!eyeEl) return;
  while (true) {
    for (let i = 0; i < morseMsg.length; i++) {
      const char = morseMsg[i];
      if (char === '-') {
        eyeEl.classList.add('oracle-flash');
        await new Promise(r => setTimeout(r, dotLen * 3));
        eyeEl.classList.remove('oracle-flash');
        await new Promise(r => setTimeout(r, dotLen));
      } else if (char === '.') {
        eyeEl.classList.add('oracle-flash');
        await new Promise(r => setTimeout(r, dotLen));
        eyeEl.classList.remove('oracle-flash');
        await new Promise(r => setTimeout(r, dotLen));
      } else if (char === ' ') {
        await new Promise(r => setTimeout(r, dotLen * 2));
      } else if (char === '/') {
        await new Promise(r => setTimeout(r, dotLen * 2));
      }
    }
    await new Promise(r => setTimeout(r, dotLen * 7));
  }
}
/* ── Boot sequence ──────────────────────────────────────── */
log('SYS', 'Oracle initialization sequence...');
log('SEC', 'Cryptographic wards active.');
log('SYS', 'Awaiting operator input');
playMorse();
</script>
