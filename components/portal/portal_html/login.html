<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Heimdall Portal Login</title>
<style>
body{font-family:ui-sans-serif,system-ui,sans-serif;background:#050505;color:#e5e2e1;margin:0;padding:32px 16px;max-width:420px;margin-left:auto;margin-right:auto}
h1{font-family:ui-serif,Georgia,serif;font-size:2rem;font-weight:600;text-align:center;margin-bottom:8px}
p{color:#d0c5af;line-height:1.6;text-align:center;margin-bottom:24px}
.msg{border:1px solid #d4af37;color:#d4af37;padding:12px;border-radius:8px;margin-bottom:16px}
label{display:block;font-family:ui-monospace,monospace;font-size:.75rem;text-transform:uppercase;letter-spacing:.1em;color:#d0c5af;margin-bottom:8px}
input{box-sizing:border-box;width:100%;padding:14px;background:#131313;border:1px solid #2d2d2d;border-radius:8px;color:#e5e2e1;font-family:ui-monospace,monospace;font-size:1.1rem;text-transform:uppercase;letter-spacing:.08em}
button{width:100%;padding:16px;margin-top:20px;background:transparent;border:1px solid #d4af37;border-radius:9999px;color:#d4af37;font-size:1rem;cursor:pointer;text-transform:uppercase;letter-spacing:.1em;font-weight:500}
button:hover{background:#d4af37;color:#050505}
</style>
</head>
<body>
<h1>Heimdall Portal</h1>
<p>Authentication required to access device configuration.</p>
<form method="POST" action="/login">
<label for="password">Device Password</label>
<input id="password" name="password" type="password" maxlength="8" pattern="[A-F0-9]{8}" autocomplete="off" inputmode="text" required>
<button type="submit">Authenticate</button>
</form>
</body>
</html>
