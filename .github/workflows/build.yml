name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ── Job 1: Build firmware (matrix: standard + hardened + hardened-stealth) ─────
  build:
    name: Build Firmware (${{ matrix.profile }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        profile: [ standard, hardened, hardened-stealth ]
        include:
          - profile: standard
            sdkconfig_defaults: sdkconfig.defaults
            artifact_name: heimdall-standard-firmware
            bin_name: heimdall-standard.bin
          - profile: hardened
            sdkconfig_defaults: sdkconfig.defaults;sdkconfig.hardened
            artifact_name: heimdall-hardened-firmware
            bin_name: heimdall-hardened.bin
          - profile: hardened-stealth
            sdkconfig_defaults: sdkconfig.defaults;sdkconfig.hardened;sdkconfig.hardened.stealth
            artifact_name: heimdall-hardened-stealth-firmware
            bin_name: heimdall-hardened-stealth.bin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so git describe produces a real version string
          fetch-depth: 0

      - name: Build with ESP-IDF v6.0.1 (${{ matrix.profile }} profile)
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v6.0.1
          target: esp32
          command: idf.py build
        env:
          SDKCONFIG_DEFAULTS: ${{ matrix.sdkconfig_defaults }}

      - name: Rename app binary to profile-specific name
        if: success()
        run: |
          sudo chown -R $USER:$USER build || true
          cp build/wol_relay.bin build/${{ matrix.bin_name }}

      - name: Report binary size
        if: success()
        run: |
          echo "## Firmware Size Report (${{ matrix.profile }})" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -lh build/*.bin 2>/dev/null | awk '{print $5, $9}' >> $GITHUB_STEP_SUMMARY || echo "build artifacts not accessible" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Prepare artifact folder
        if: success()
        run: |
          mkdir -p artifact_out
          cp build/${{ matrix.bin_name }} artifact_out/
          cp build/bootloader/bootloader.bin artifact_out/
          cp build/partition_table/partition-table.bin artifact_out/

      - name: Upload firmware artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-${{ github.sha }}
          path: artifact_out/*
          retention-days: 30

  # ── Job 2: Release (runs only on pushed tags) ─────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download standard firmware artifacts
        uses: actions/download-artifact@v4
        with:
          name: heimdall-standard-firmware-${{ github.sha }}
          path: artifacts/standard

      - name: Download hardened firmware artifacts
        uses: actions/download-artifact@v4
        with:
          name: heimdall-hardened-firmware-${{ github.sha }}
          path: artifacts/hardened

      - name: Download hardened-stealth firmware artifacts
        uses: actions/download-artifact@v4
        with:
          name: heimdall-hardened-stealth-firmware-${{ github.sha }}
          path: artifacts/hardened-stealth

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/standard/bootloader.bin
            artifacts/standard/partition-table.bin
            artifacts/standard/heimdall-standard.bin
            artifacts/hardened/heimdall-hardened.bin
            artifacts/hardened-stealth/heimdall-hardened-stealth.bin
        # bootloader.bin and partition-table.bin are taken from the standard
        # artifact only. Each profile's full set lives in its own subdirectory
        # above so a future profile with a different partition layout won't
        # silently overwrite the shared binaries.

  # ── Job 3: Prepare Pages Artifact ─────────────────────────────────────────────
  prepare-pages:
    name: Prepare Web Flasher
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Download each profile into its own staging directory so that
      # bootloader.bin / partition-table.bin are never silently overwritten.
      # The copy step below flattens only the required files into docs/.
      - name: Download standard firmware artifacts
        uses: actions/download-artifact@v4
        with:
          name: heimdall-standard-firmware-${{ github.sha }}
          path: staging/standard

      - name: Download hardened firmware artifacts
        uses: actions/download-artifact@v4
        with:
          name: heimdall-hardened-firmware-${{ github.sha }}
          path: staging/hardened

      - name: Download hardened-stealth firmware artifacts
        uses: actions/download-artifact@v4
        with:
          name: heimdall-hardened-stealth-firmware-${{ github.sha }}
          path: staging/hardened-stealth

      - name: Copy firmware binaries into docs/
        run: |
          # Shared binaries — taken from standard (all profiles use the same
          # bootloader and partition table today; update this step if that changes)
          cp staging/standard/bootloader.bin        docs/bootloader.bin
          cp staging/standard/partition-table.bin   docs/partition-table.bin
          # Per-profile application binaries
          cp staging/standard/heimdall-standard.bin                   docs/heimdall-standard.bin
          cp staging/hardened/heimdall-hardened.bin                   docs/heimdall-hardened.bin
          cp staging/hardened-stealth/heimdall-hardened-stealth.bin   docs/heimdall-hardened-stealth.bin

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  # ── Job 4: Deploy to GitHub Pages ─────────────────────────────────────────────
  deploy-pages:
    name: Deploy Web Flasher to Pages
    runs-on: ubuntu-latest
    needs: prepare-pages
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
