name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  # ── Job 1: Build the main firmware ──────────────────────────────────────────
  build:
    name: Build Firmware (ESP32)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so git describe produces a real version string
          fetch-depth: 0

      - name: Build with ESP-IDF v6.0.1
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v6.0.1
          target: esp32
          command: idf.py build

      - name: Report binary size
        if: success()
        run: |
          echo "## Firmware Size Report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -lh build/*.bin 2>/dev/null | awk '{print $5, $9}' >> $GITHUB_STEP_SUMMARY || echo "build artifacts not accessible" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload firmware artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: heimdall-firmware-${{ github.sha }}
          path: |
            build/wol_relay.bin
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
          retention-days: 30

  # ── Job 2: Release (runs only on pushed tags) ───────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download firmware artifacts
        uses: actions/download-artifact@v4
        with:
          name: heimdall-firmware-${{ github.sha }}
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/wol_relay.bin
            artifacts/bootloader/bootloader.bin
            artifacts/partition_table/partition-table.bin
